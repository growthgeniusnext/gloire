<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galerie Photo - Emile & Korotoum</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <link rel="stylesheet" href="style.css">
</head>
<body class="galerie-body">

  <header class="galerie-header">
    <a href="index.html" class="btn-back">
      <i class="fa-solid fa-arrow-left"></i> Accueil
    </a>
    <h1 class="galerie-title">Souvenirs</h1>
    <div style="width: 70px;"></div> </header>

  <div class="slider-viewport">
    <div class="slider-track" id="sliderTrack">
      <div class="slide-item"><img src="images/photo 09.png" alt="Photo 1"></div>
      <div class="slide-item"><img src="images/bisK.jpeg" alt="Photo 2"></div>
      <div class="slide-item"><img src="images/photo L7 bis.jpg" alt="Photo 3"></div>
      <div class="slide-item"><img src="images/photo 1J2 bis.jpeg" alt="Photo 4"></div>
    </div>

    <button class="arrow-btn arrow-left" onclick="moveSlide(-1)" aria-label="Photo précédente">
      <i class="fa-solid fa-chevron-left"></i>
    </button>
    <button class="arrow-btn arrow-right" onclick="moveSlide(1)" aria-label="Photo suivante">
      <i class="fa-solid fa-chevron-right"></i>
    </button>

    <div class="counter-badge" id="photoCounter">1 / 4</div>
  </div>

  <script>
    let currentSlide = 0;
    const track = document.getElementById('sliderTrack');
    const slides = document.querySelectorAll('.slide-item');
    const counter = document.getElementById('photoCounter');
    const totalSlides = slides.length;

    function updateSlider() {
      // Déplace la piste de gauche à droite selon l'index de l'image
      track.style.transform = `translateX(-${currentSlide * 100}%)`;
      // Met à jour le petit compteur en bas
      counter.textContent = `${currentSlide + 1} / ${totalSlides}`;
    }

    function moveSlide(direction) {
      currentSlide += direction;
      
      // Boucle infinie : si on dépasse la fin, on revient au début, et inversement
      if (currentSlide >= totalSlides) currentSlide = 0;
      if (currentSlide < 0) currentSlide = totalSlides - 1;
      
      updateSlider();
    }

    // Gestion du balayage au doigt (Tactile pour smartphones et tablettes)
    let startX = 0;
    document.addEventListener('touchstart', (e) => {
      startX = e.touches[0].clientX;
    }, false);

    document.addEventListener('touchend', (e) => {
      let endX = e.changedTouches[0].clientX;
      // Détection d'un glissement franc (plus de 50 pixels de différence)
      if (startX - endX > 50) {
        moveSlide(1);  // Glissement vers la gauche -> Photo suivante
      }
      if (endX - startX > 50) {
        moveSlide(-1); // Glissement vers la droite -> Photo précédente
      }
    }, false);
  </script>

</body>
</html>
